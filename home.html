    <div id="root"></div>

    <script>
      let arr = ["palak", "nisha", "jiya"];
      let str = "something";
      function reverseStr() {
        let reverse = "";
        for (let i = str.length - 1; i >= 0; i--) {
          reverse += str[i];
        }
        return reverse;
      }
  
        let root = (document.getElementById("root").textContent =
          `${reverseStr()}`);
    </script>
